<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Captura de Coordenadas</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
        }

        #header-image {
            width: 40%;
            height: auto;
            display: block;
            margin: 0 auto 20px;
        }

        #coordinates {
            margin-top: 20px;
        }

        #map {
            width: 100%;
            height: 400px;
            margin-top: 20px;
            display: none;
        }

        .buttons {
            margin-top: 10px;
        }

        #camera-container {
            display: none;
            margin-top: 20px;
        }

        #video {
            width: 100%;
            max-width: 400px;
        }

        #photo {
            display: none;
            width: 100%;
            max-width: 400px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            margin-right: 10px;
        }

        button:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }

        footer {
            margin-top: 30px;
            font-size: 12px;
            color: #555;
        }

        h2 {
            margin: 0;
        }
    </style>
</head>

<body>
    <h2>Capturar a localização atual</h2>
    <img id="header-image" src="gagliardi.png" alt="Imagem de Geolocalização">

    <p id="coordinates">Informe o código do cliente e clique no botão abaixo para obter suas coordenadas.</p>

    <input type="text" id="clientCode" placeholder="Insira o código do cliente" oninput="validateClientCode()" maxlength="7" />
    <div class="buttons">
        <button id="getLocationButton" onclick="getLocation()" disabled>Obter Coordenadas</button>
        <button id="copyButton" onclick="copyCoordinates()">Copiar Dados</button>
        <button id="restartButton" onclick="restartProcess()">Reiniciar</button>
    </div>

    <div id="camera-container">
        <video id="video" autoplay></video>
        <button onclick="capturePhoto()">Tirar Foto</button>
        <canvas id="canvas" style="display: none;"></canvas>
        <img id="photo" alt="Foto Capturada">
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let map, marker, currentCoordinates = "", currentClientCode = "", photoData = "";

        function validateClientCode() {
            const clientCodeInput = document.getElementById("clientCode");
            const getLocationButton = document.getElementById("getLocationButton");
            const regex = /^[Cc]\d{6}$/;

            getLocationButton.disabled = !regex.test(clientCodeInput.value.trim());
        }

        async function getLocation() {
            currentClientCode = document.getElementById("clientCode").value.trim();
            document.getElementById("clientCode").disabled = true;
            document.getElementById("getLocationButton").disabled = true;

            if (navigator.geolocation) {
                document.getElementById("coordinates").innerText = "Obtendo localização...";
                navigator.geolocation.getCurrentPosition(
                    async position => {
                        const { latitude, longitude } = position.coords;
                        currentCoordinates = `Latitude: ${latitude}, Longitude: ${longitude}`;
                        showPosition(latitude, longitude);
                        initMap(latitude, longitude);
                        await startCamera();
                        document.getElementById("copyButton").style.display = "inline-block";
                        document.getElementById("restartButton").style.display = "inline-block";
                    },
                    showError,
                    { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
                );
            } else {
                alert("Geolocalização não suportada.");
            }
        }

        function showPosition(latitude, longitude) {
            document.getElementById("coordinates").innerHTML = 
                `Código do Cliente: ${currentClientCode}<br>Latitude: ${latitude}, Longitude: ${longitude}`;
        }

        function initMap(latitude, longitude) {
            const mapElement = document.getElementById("map");
            mapElement.style.display = "block";

            if (!map) {
                map = L.map(mapElement).setView([latitude, longitude], 15);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    maxZoom: 19,
                    attribution: '© OpenStreetMap contributors'
                }).addTo(map);
            } else {
                map.setView([latitude, longitude], 15);
            }

            if (!marker) {
                marker = L.marker([latitude, longitude]).addTo(map);
            } else {
                marker.setLatLng([latitude, longitude]);
            }
            marker.bindPopup("Você está aqui!").openPopup();
        }

        async function startCamera() {
            const cameraContainer = document.getElementById("camera-container");
            const video = document.getElementById("video");

            cameraContainer.style.display = "block";

            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;
        }

        function capturePhoto() {
            const canvas = document.getElementById("canvas");
            const video = document.getElementById("video");
            const photo = document.getElementById("photo");

            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext("2d").drawImage(video, 0, 0);
            photoData = canvas.toDataURL("image/png");

            photo.src = photoData;
            photo.style.display = "block";
        }

        function copyCoordinates() {
            const textToCopy = `Código do Cliente: ${currentClientCode}\n${currentCoordinates}`;
            navigator.clipboard.writeText(textToCopy).then(() => {
                alert("Dados copiados para a área de transferência!");
            });
        }

        function restartProcess() {
            location.reload();
        }
    </script>

    <footer>O Grupo Gagliardi não armazena ou compartilha coordenadas sem sua permissão.</footer>
</body>

</html>
